name: Stakewell CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Smart contract tests ─────────────────────────────────────────────
  contracts:
    name: Contracts — Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Install Stellar CLI
        run: |
          curl -sL https://github.com/stellar/stellar-cli/releases/download/v26.0.0/stellar-cli-26.0.0-x86_64-unknown-linux-musl.tar.gz | tar xz
          mv stellar /usr/local/bin/stellar
          stellar --version

      - name: Build token contract (wasm32v1-none)
        run: stellar contract build --package stakewell-token

      - name: Build rewards contract (wasm32v1-none)
        run: stellar contract build --package stakewell-rewards

      - name: Build staking contract (wasm32v1-none)
        run: stellar contract build --package stakewell-staking

      - name: Run all contract tests
        run: cargo test --workspace --verbose

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-contracts
          path: target/wasm32v1-none/release/*.wasm

  # ── Job 2: Frontend lint + build ────────────────────────────────────────────
  frontend:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (static export)
        run: npm run build
        env:
          NEXT_PUBLIC_NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"
          NEXT_PUBLIC_RPC_URL: "https://soroban-testnet.stellar.org"
          NEXT_PUBLIC_HORIZON_URL: "https://horizon-testnet.stellar.org"
          NEXT_PUBLIC_CONTRACT_STAKING: ${{ secrets.NEXT_PUBLIC_CONTRACT_STAKING || '' }}
          NEXT_PUBLIC_CONTRACT_REWARDS: ${{ secrets.NEXT_PUBLIC_CONTRACT_REWARDS || '' }}
          NEXT_PUBLIC_CONTRACT_TOKEN: ${{ secrets.NEXT_PUBLIC_CONTRACT_TOKEN || '' }}
          NEXT_PUBLIC_XLM_SAC: "CDLZFC3SYJYDZT7K67VZ75HPJVIEUVNIXF47ZG2FB2RMQQVU2HHGCN4"
          NEXT_PUBLIC_APY_BPS: "1200"

      - name: Upload static export
        uses: actions/upload-artifact@v4
        with:
          name: frontend-out
          path: frontend/out/

  # ── Job 3: Contract integration check ───────────────────────────────────────
  integration-check:
    name: Integration — Contract ABI check
    runs-on: ubuntu-latest
    needs: [contracts]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install Stellar CLI
        run: |
          curl -sL https://github.com/stellar/stellar-cli/releases/download/v26.0.0/stellar-cli-26.0.0-x86_64-unknown-linux-musl.tar.gz | tar xz
          mv stellar /usr/local/bin/stellar

      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: wasm-contracts
          path: target/wasm32v1-none/release/

      - name: Inspect token contract interface
        run: stellar contract inspect --wasm target/wasm32v1-none/release/stakewell_token.wasm

      - name: Inspect rewards contract interface
        run: stellar contract inspect --wasm target/wasm32v1-none/release/stakewell_rewards.wasm

      - name: Inspect staking contract interface
        run: stellar contract inspect --wasm target/wasm32v1-none/release/stakewell_staking.wasm

  # ── Job 4: Deploy to Cloudflare Pages (on main push only) ───────────────────
  deploy:
    name: Deploy — Cloudflare Pages
    runs-on: ubuntu-latest
    needs: [contracts, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-out
          path: out/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: stakewell
          directory: out
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
